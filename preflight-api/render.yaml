services:
  - type: web
    name: preflight-api
    env: python
    region: oregon
    plan: free
    rootDir: preflight-api
    buildCommand: pip install -r requirements.txt && npm install acorn
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: preflight_db
      - key: NPM_REGISTRY_URL
        value: https://registry.npmjs.org
      - key: PYTHON_VERSION
        value: 3.11.0
